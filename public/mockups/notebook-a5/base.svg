<svg width="640" height="840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cover-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ebe2"/>
      <stop offset="100%" stop-color="#e4ddd0"/>
    </linearGradient>
    <linearGradient id="spine-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2320"/>
      <stop offset="100%" stop-color="#3d3530"/>
    </linearGradient>
    <linearGradient id="page-stack" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#f8f5ee"/>
      <stop offset="100%" stop-color="#ede8de"/>
    </linearGradient>
    <filter id="book-shadow">
      <feDropShadow dx="4" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Book shadow -->
  <rect x="48" y="20" width="556" height="800" rx="3" fill="#000" opacity="0.25" filter="url(#book-shadow)"/>
  <!-- Page stack (right edge) — gives book thickness -->
  <rect x="576" y="22" width="18" height="796" rx="2" fill="url(#page-stack)"/>
  <!-- Page stack lines -->
  <line x1="577" y1="22" x2="577" y2="818" stroke="#e0dbd0" stroke-width="0.5"/>
  <line x1="580" y1="22" x2="580" y2="818" stroke="#e8e4da" stroke-width="0.5"/>
  <line x1="583" y1="22" x2="583" y2="818" stroke="#e0dbd0" stroke-width="0.5"/>
  <!-- Spine -->
  <rect x="40" y="20" width="28" height="800" rx="2" fill="url(#spine-grad)"/>
  <!-- Spine highlight -->
  <rect x="40" y="20" width="6" height="800" fill="#ffffff" opacity="0.08" rx="2"/>
  <!-- Front cover -->
  <rect x="68" y="20" width="508" height="800" rx="3" fill="url(#cover-bg)"/>
  <!-- Photo zone — centred on cover with margin -->
  <rect x="108" y="80" width="428" height="540" fill="#ccc8be" rx="4"/>
  <!-- Cover title area below photo -->
  <rect x="108" y="644" width="180" height="8" rx="4" fill="#b8b0a0"/>
  <rect x="108" y="662" width="100" height="5" rx="2.5" fill="#c8c0b0"/>
  <!-- Bottom logo area -->
  <rect x="108" y="750" width="60" height="6" rx="3" fill="#d0c8b8"/>
  <!-- Subtle cover grain -->
  <rect x="68" y="20" width="508" height="800" rx="3" fill="#ffffff" opacity="0.04"/>
</svg>
