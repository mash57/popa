<svg width="440" height="440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="drop-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="edge-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Drop shadow layer -->
  <rect x="20" y="24" width="400" height="400" rx="6" fill="#000" opacity="0.3" filter="url(#drop-shadow)"/>
  <!-- White magnet face -->
  <rect x="20" y="20" width="400" height="400" rx="6" fill="#f8f8f8"/>
  <!-- Photo zone with thin white border -->
  <rect x="36" y="36" width="368" height="368" fill="#dddad4" rx="3"/>
  <!-- Thin white border around photo zone -->
  <rect x="20" y="20" width="400" height="400" rx="6" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Subtle edge bevel -->
  <rect x="20" y="20" width="400" height="400" rx="6" fill="url(#edge-shine)"/>
</svg>
